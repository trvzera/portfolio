<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folders UI</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #e8e5e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      padding: 4rem;
    }

    .folders-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4rem 4rem;
    }

    /* ── Folder shell ── */
    .folder {
      position: relative;
      width: 200px;
      height: 160px;
      cursor: pointer;
    }

    /* Tab */
    .folder-tab {
      position: absolute;
      top: 0;
      left: 16px;
      width: 64px;
      height: 22px;
      background: rgba(248, 247, 244, 0.92);
      border-radius: 12px 12px 0 0;
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      border-bottom: none;
      z-index: 4;
      transform-origin: bottom left;
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    /* Body back (bottom half that stays) */
    .folder-back {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 138px;
      border-radius: 8px 22px 22px 22px;
      background: linear-gradient(150deg,
          rgba(238, 236, 230, 0.9) 0%,
          rgba(222, 220, 214, 0.85) 100%);
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      z-index: 2;
    }

    /* Body front (lid that opens) */
    .folder-front {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 138px;
      border-radius: 8px 22px 22px 22px;
      background: linear-gradient(150deg,
          rgba(254, 253, 251, 0.97) 0%,
          rgba(245, 243, 239, 0.92) 45%,
          rgba(234, 232, 227, 0.88) 100%);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      box-shadow:
        0 14px 44px rgba(0, 0, 0, 0.10),
        0 3px 10px rgba(0, 0, 0, 0.06),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 5;
      transform-origin: bottom center;
      transition: transform 0.45s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    /* ── Cards / items inside ── */
    .item {
      position: absolute;
      z-index: 3;
      border-radius: 14px;
      overflow: hidden;
      border: 2.5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.45s cubic-bezier(0.34, 1.3, 0.64, 1),
        opacity 0.3s ease;
    }

    /* resting – stacked behind front face */
    .item-1 {
      width: 110px;
      height: 80px;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) rotate(-12deg) translateY(6px);
      opacity: 0.85;
    }

    .item-2 {
      width: 100px;
      height: 74px;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) rotate(0deg) translateY(4px);
      opacity: 0.9;
    }

    .item-3 {
      width: 94px;
      height: 70px;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) rotate(10deg) translateY(6px);
      opacity: 0.85;
    }

    /* ── HOVER STATE ── */
    .folder:hover .folder-front {
      transform: perspective(600px) rotateX(-28deg) translateY(-12px) scaleX(0.98);
    }

    .folder:hover .folder-tab {
      transform: rotate(-8deg) translateY(-4px);
    }

    /* items fly out */
    .folder:hover .item-1 {
      transform: translateX(calc(-50% - 62px)) rotate(-20deg) translateY(-54px);
      opacity: 1;
    }

    .folder:hover .item-2 {
      transform: translateX(-50%) rotate(0deg) translateY(-64px);
      opacity: 1;
    }

    .folder:hover .item-3 {
      transform: translateX(calc(-50% + 62px)) rotate(18deg) translateY(-54px);
      opacity: 1;
    }

    /* whole folder lifts */
    .folder {
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .folder:hover {
      transform: translateY(-8px);
    }
  </style>
</head>

<body>

  <div class="folders-grid">

    <!-- Folder 1 -->
    <div class="folder">
      <div class="item item-1">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#c94b4b,#4b134f)"></div>
      </div>
      <div class="item item-2">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#f7971e,#ffd200)"></div>
      </div>
      <div class="item item-3">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#1c92d2,#a8edea)"></div>
      </div>
      <div class="folder-back"></div>
      <div class="folder-tab"></div>
      <div class="folder-front"></div>
    </div>

    <!-- Folder 2 -->
    <div class="folder">
      <div class="item item-1">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#373b44,#4286f4)"></div>
      </div>
      <div class="item item-2">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#56ab2f,#a8e063)"></div>
      </div>
      <div class="item item-3">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#f953c6,#b91d73)"></div>
      </div>
      <div class="folder-back"></div>
      <div class="folder-tab"></div>
      <div class="folder-front"></div>
    </div>

    <!-- Folder 3 -->
    <div class="folder">
      <div class="item item-1">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#0f2027,#2c5364)"></div>
      </div>
      <div class="item item-2">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#f7797d,#fbd786)"></div>
      </div>
      <div class="item item-3">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#134e5e,#71b280)"></div>
      </div>
      <div class="folder-back"></div>
      <div class="folder-tab"></div>
      <div class="folder-front"></div>
    </div>

    <!-- Folder 4 -->
    <div class="folder">
      <div class="item item-1">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#232526,#414345)"></div>
      </div>
      <div class="item item-2">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#ee9ca7,#ffdde1)"></div>
      </div>
      <div class="item item-3">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#4e54c8,#8f94fb)"></div>
      </div>
      <div class="folder-back"></div>
      <div class="folder-tab"></div>
      <div class="folder-front"></div>
    </div>

  </div>
</body>

</html>
